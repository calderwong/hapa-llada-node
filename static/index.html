<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hapa LLaDA Node</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-icon">H</div>
                <div class="logo-text">
                    <h1>Hapa Node</h1>
                    <span>LLaDA 2.0 • MLX Sovereign</span>
                </div>
            </div>
            <div class="header-controls">
                <div class="token-input-wrapper">
                    <input type="password" id="auth-token" placeholder="Enter Node Token (Check Logs)"
                        class="token-input">
                </div>
                <div class="status-badge" id="status-badge">
                    <div class="status-dot"></div>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <main>
            <!-- Top Controls (Model Params) -->
            <div class="controls">
                <div class="control-pill" title="Parameters"><i class="fa-solid fa-brain"></i> LLaDA 2.0 Mini (4-bit)
                </div>
                <div class="control-pill" title="Temperature"><i class="fa-solid fa-temperature-half"></i> 0.7</div>
                <div class="control-pill" title="Max Tokens"><i class="fa-solid fa-ruler-horizontal"></i> 200 Ti</div>
            </div>

            <!-- Chat/Output Area -->
            <div class="output-area" id="output-area">
                <div class="message ai">
                    <div class="markdown-body">
                        <p><strong>System initialized.</strong> LLaDA 2.0 (Large Language Diffusion) is ready.</p>
                        <p>Running on Apple Silicon (MLX). Enter your Node Token to begin.</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area" id="input-container">
                <div class="diffusion-loader"></div>
                <textarea id="user-input" placeholder="Enter your prompt for diffusion..." rows="1"
                    autofocus></textarea>
                <button class="send-btn" id="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
